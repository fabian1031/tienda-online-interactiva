<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="../styles/reset.css">
    <link rel="stylesheet" href="../style.css">

    <title>Contacto</title>
</head>

<body>

<!-- barra de navegacion -->
<nav class="navbar navbar-expand-lg">
  <div class="container-fluid">
    <a class="navbar-brand d-flex align-items-center" href="../index.html">
      <img src="https://perot-m.imgix.net/wp-content/uploads/earth-1.gif" alt="Logo" width="50" height="50" class="me-2">
      RutaViajera
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarSupportedContent">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link" href="../index.html">Inicio</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#">Destinos</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#">Experiencias/Tours</a>
        </li>
        <li class="nav-item">
          <a class="nav-link active" href="contacto.html">Contacto</a>
        </li>
      </ul>
      <form class="d-flex" role="search">
        <input class="form-control me-2" type="search" placeholder="Buscar" />
        <button class="btn btn-outline-success" type="submit">Buscar</button>
      </form>
      <button class="btn btn-outline-primary ms-2" type="button">
        🛒 Carrito <span id="contador-carrito" class="badge bg-danger">0</span>
      </button>
    </div>
  </div>
</nav>

<!-- formulario de contacto -->
<section class="container my-5 contacto">
    <div class="text-center mb-4">
        <h2 class="fw-bold" style="color: var(--color-primario);">✈️ Contáctanos</h2>
        <p class="text-muted">Cuéntanos qué viaje sueñas y te ayudamos a hacerlo realidad</p>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card p-4 shadow-sm" style="border-radius: 20px;">
                <form id="form-contacto">
                    <div class="row g-3">

                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Nombre completo *</label>
                            <input type="text" id="nombre" class="form-control" placeholder="Ana Martínez" required>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Correo *</label>
                            <input type="email" id="email" class="form-control" placeholder="tu@correo.com" required>
                        </div>

                        <div class="col-12">
                            <label class="form-label fw-semibold">Mensaje *</label>
                            <textarea id="mensaje" class="form-control" rows="4" required></textarea>
                        </div>

                        <div class="col-12 text-center">
                            <button type="submit" class="btn btn-agregar">Enviar</button>
                        </div>

                    </div>
                </form>

                <!-- mensaje de exito -->
                <div id="mensaje-exito" class="alert alert-success mt-4 text-center" style="display: none;">
                    ✅ Gracias. En breve te contactaremos.
                </div>
            </div>
        </div>
    </div>
</section>

<!-- pie de pagina -->
<footer id="pieDePagina"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

<!-- script del formulario -->
<script>
    const formContacto = document.getElementById('form-contacto');
    const mensajeExito = document.getElementById('mensaje-exito');

    if (formContacto) {
        formContacto.addEventListener('submit', function(e) {
            e.preventDefault();
            mensajeExito.style.display = 'block';
            formContacto.reset();
            setTimeout(function() {
                mensajeExito.style.display = 'none';
            }, 5000);
        });
    }
</script>

</body>
</html>
